<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Warmer</title>
    <style>
        body {
            margin: 0; background: #000; color: #fff;
            font-family: sans-serif; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; transition: background 0.3s;
        }
        #status { font-weight: bold; margin-bottom: 20px; z-index: 10; color: #ff0000; }
        button {
            width: 250px; height: 80px; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; border: 4px solid #ff0000; background: #000; color: #ff0000;
            z-index: 10; text-transform: uppercase;
        }
        .active-mode { background: #fff !important; color: #000 !important; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>

    <div id="status">РЕЖИМ: ОЖИДАНИЕ</div>
    <button id="mainBtn">ВРУБИТЬ НА ПОЛНУЮ</button>
    <canvas id="heavyCanvas"></canvas>

    <script>
        let isRunning = false;
        let workers = [];
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('heavyCanvas');
        const gl = canvas.getContext('webgl');

        // Код для "тяжелого" воркера (CPU + RAM)
        const workerCode = `
            self.onmessage = function() {
                const bufferSize = 1024 * 1024 * 2; // 16MB за раз
                let temp;
                while (true) {
                    // Имитируем тяжелую нагрузку на кэш процессора
                    temp = new Uint32Array(bufferSize).map(() => Math.random() * 0xFFFFFFFF);
                    temp.sort(); // Сортировка - это ОЧЕНЬ тяжелая операция для CPU
                }
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);

        function startGpuLoad() {
            if (!isRunning) return;
            // Рисуем максимально тяжелые случайные точки
            gl.clearColor(Math.random(), 0, 0, 1);
            gl.clear(gl.COLOR_BUFFER_BIT);
            // Заставляем браузер делать лишнюю работу
            for(let i=0; i<500; i++) {
                gl.viewport(Math.random()*10, Math.random()*10, canvas.width, canvas.height);
            }
            requestAnimationFrame(startGpuLoad);
        }

        btn.onclick = () => {
            if (!isRunning) {
                isRunning = true;
                btn.innerText = "ВЫКЛЮЧИТЬ";
                btn.classList.add('active-mode');
                document.body.style.background = "#fff"; // Белый фон греет экран сильнее
                status.innerText = "РЕЖИМ: МАКСИМАЛЬНЫЙ ЖАР";

                // Запускаем воркеры (по 2 на каждое ядро для перегрузки)
                const cores = (navigator.hardwareConcurrency || 4) * 2;
                for (let i = 0; i < cores; i++) {
                    const w = new Worker(workerUrl);
                    w.postMessage('go');
                    workers.push(w);
                }
                startGpuLoad();
            } else {
                location.reload(); // Проще всего перезагрузить страницу для полной очистки
            }
        };
    </script>
</body>
</html>
