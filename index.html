<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme Phone Warmer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #ff3300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #status { margin-bottom: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #ff3300;
            background: transparent;
            color: #ff3300;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 20px #ff3300;
            transition: all 0.3s;
        }
        button.active {
            background: #ff3300;
            color: #000;
            box-shadow: 0 0 50px #ff3300, inset 0 0 20px #000;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }
    </style>
</head>
<body>

    <div id="status">Система: Ожидание</div>
    <button id="toggleBtn">МАКСИМУМ</button>
    <canvas id="gpuCanvas"></canvas>

    <script>
        let isRunning = false;
        let workers = [];
        const btn = document.getElementById('toggleBtn');
        const statusText = document.getElementById('status');
        const canvas = document.getElementById('gpuCanvas');
        const gl = canvas.getContext('webgl');

        // CPU + RAM Stress Worker
        const workerCode = `
            self.onmessage = function() {
                let storage = [];
                while (true) {
                    // CPU Stress
                    for(let i=0; i<100000; i++) { Math.atan(Math.random()) * Math.exp(Math.random()); }
                    // RAM Stress (постоянное выделение памяти)
                    if (storage.length > 500) storage = [];
                    storage.push(new Float64Array(10000));
                }
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);

        function stressGPU() {
            if (!isRunning) return;
            // Заставляем WebGL рисовать мусор каждый кадр
            gl.clearColor(Math.random(), Math.random(), Math.random(), 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);
            requestAnimationFrame(stressGPU);
        }

        btn.onclick = () => {
            if (!isRunning) {
                const threads = (navigator.hardwareConcurrency || 4) * 2; // Удваиваем потоки для агрессии
                for (let i = 0; i < threads; i++) {
                    const w = new Worker(workerUrl);
                    w.postMessage('go');
                    workers.push(w);
                }
                
                isRunning = true;
                btn.classList.add('active');
                btn.innerText = "СТОП";
                statusText.innerText = "РЕЖИМ: ЭКСТРЕМАЛЬНЫЙ НАГРЕВ";
                stressGPU();
            } else {
                workers.forEach(w => w.terminate());
                workers = [];
                isRunning = false;
                btn.classList.remove('active');
                btn.innerText = "МАКСИМУМ";
                statusText.innerText = "Система: Ожидание";
            }
        };
    </script>
</body>
</html>
